<!DOCTYPE html>
<html>
<head>
  <title>Create Meet - Driving Empire Meets</title>
  <link rel="stylesheet" href="Styles/style.css">
  <script type="module" src="JavaScript/firebase.js"></script>
  <script src="JavaScript/createMeetWindow.js" defer></script>
</head>
<body class="popup-body">
  <div class="popup-box">
    <h1>Create a Meet</h1>

    <input id="meetTitle" type="text" placeholder="Meet name">
    <input id="meetLink" type="text" placeholder="Server link">

    <div class="panel-buttons">
      <button onclick="submitMeet()">Post Meet</button>
      <button onclick="window.close()">Cancel</button>
    </div>

    <p id="popupStatus"></p>
  </div>
</body>
</html>
